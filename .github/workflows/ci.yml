name: CI
'on':
  - push
env:
  PHP_TOOLING_VERSION: '8.5'
jobs:
  phpSyntaxCheck:
    name: 'Syntax Check (PHP ${{ matrix.php.version }})'
    strategy:
      matrix:
        php:
          -
            version: '8.2'
            experimental: false
          -
            version: '8.3'
            experimental: false
          -
            version: '8.4'
            experimental: false
          -
            version: '8.5'
            experimental: false
          -
            version: '8.6'
            experimental: true
    runs-on: ubuntu-24.04
    steps:
      -
        uses: actions/checkout@v6
      -
        name: 'Set up PHP ${{ matrix.php.version }}'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '${{ matrix.php.version }}'
      -
        name: 'Syntax Check'
        continue-on-error: '${{ matrix.php.experimental }}'
        env:
          LANG: C
        run: |
          xargs_opts=
          if [ "$(php -r 'echo PHP_VERSION_ID;')" -lt 80300 ]; then
            xargs_opts='-n 1'
          fi
          find . \( -type d \( -name '.git' -or -name 'vendor' -or -name 'node_modules' -or -name 'runtime' \) -prune \) -or \( -type f -name '*.php' -print \) \
            | sort \
            | xargs $xargs_opts php -l
  phpcs:
    name: PHPCS
    runs-on: ubuntu-24.04
    needs:
      - phpSyntaxCheck
    steps:
      -
        uses: actions/checkout@v6
      -
        name: 'Set up PHP ${{ env.PHP_TOOLING_VERSION }}'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '${{ env.PHP_TOOLING_VERSION }}'
      -
        name: 'Install Composer dependencies'
        run: 'composer install'
      -
        name: 'Run PHPCS'
        run: ./vendor/bin/phpcs
  phpstan:
    name: PHPStan
    runs-on: ubuntu-24.04
    needs:
      - phpSyntaxCheck
    steps:
      -
        uses: actions/checkout@v6
      -
        name: 'Set up PHP ${{ env.PHP_TOOLING_VERSION }}'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '${{ env.PHP_TOOLING_VERSION }}'
      -
        name: 'Install Composer dependencies'
        run: 'composer install'
      -
        name: 'Run PHPStan'
        run: './vendor/bin/phpstan --memory-limit=1G'
  test:
    name: 'Test (PHP ${{ matrix.php.version }})'
    needs:
      - phpSyntaxCheck
    strategy:
      matrix:
        php:
          -
            version: '8.2'
            experimental: false
          -
            version: '8.3'
            experimental: false
          -
            version: '8.4'
            experimental: false
          -
            version: '8.5'
            experimental: false
          -
            version: '8.6'
            experimental: true
    runs-on: ubuntu-24.04
    steps:
      -
        uses: actions/checkout@v6
      -
        name: 'Set up PHP ${{ matrix.php.version }}'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '${{ matrix.php.version }}'
      -
        name: 'Install Composer dependencies'
        run: 'composer install'
      -
        name: 'Run unit test'
        continue-on-error: '${{ matrix.php.experimental }}'
        run: 'vendor/bin/phpunit'
